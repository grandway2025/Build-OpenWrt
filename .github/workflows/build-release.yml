name: Build releases

run-name: Build ${{ inputs.device }} • ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      device:
        description: "目标设备"
        required: true
        default: "x86_64"
        type: choice
        options:
          - x86_64
          - armv8
          - nanopi-r4s
          - nanopi-r5s
          - nanopi-r76s

      version:
        description: "OpenWrt 版本"
        required: true
        default: 'release'
        type: choice
        options:
          - 'release'
          - 'snapshot-25.12'

      lan_addr:
        description: "默认 LAN 地址"
        required: true
        default: "192.168.1.10"
        type: string

      root_password:
        description: "默认 root 密码，留空表示无密码"
        required: false
        default: ""
        type: string

      ccache:
        description: 'Enable ccache (Use Cache to speed up next build)'
        type: boolean
        default: false
        
      mihomo_core:
        description: "Mihomo 内核"
        required: true
        default: "meta"
        type: choice
        options:
          - meta
          - smart

      build_options:
        description: "构建选项"
        required: false
        default: "BUILD_FAST=y ENABLE_BPF=y ENABLE_LTO=y ENABLE_LRNG=y ENABLE_MOLD=y KERNEL_CLANG_LTO=y"
        type: string

permissions:
  contents: write
  actions: read

concurrency:
  group: build-release-${{ github.workflow }}-${{ inputs.device }}-${{ inputs.version }}
  cancel-in-progress: false

env:
  # 提前启用 Node.js 24，减少 Node.js 20 deprecated 警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  TZ: Asia/Shanghai

  ROM_DIR: /builder/rom
  INFO_DIR: /builder/info

  DEVICE: ${{ inputs.device }}
  OPENWRT_VERSION: ${{ inputs.version }}
  LAN_ADDR: ${{ inputs.lan_addr }}
  ROOT_PASSWORD: ${{ inputs.root_password }}
  MIHOMO_CORE: ${{ inputs.mihomo_core }}
  BUILD_OPTIONS: ${{ inputs.build_options }}

jobs:
  build:
    name: Build ${{ inputs.device }}
    runs-on: ubuntu-24.04
    timeout-minutes: 720

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show build inputs
        run: |
          set -euo pipefail

          echo "Device: ${DEVICE}"
          echo "Version: ${OPENWRT_VERSION}"
          echo "LAN: ${LAN_ADDR}"
          echo "Mihomo: ${MIHOMO_CORE}"
          echo "Build options: ${BUILD_OPTIONS}"
          echo "Runner: $(uname -a)"
          echo "Disk:"
          df -hT

      - name: Prepare workspace
        run: |
          set -euo pipefail

          sudo mkdir -p /builder
          sudo chown -R "${USER}:${USER}" /builder

          mkdir -p "${ROM_DIR}" "${INFO_DIR}"

          echo "Workspace prepared:"
          echo "  ROM_DIR=${ROM_DIR}"
          echo "  INFO_DIR=${INFO_DIR}"

      - name: Free disk space
        run: |
          set -euo pipefail

          echo "Before cleanup:"
          df -hT

          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af || true

          echo "After cleanup:"
          df -hT

      # =====================================================================
      # 这里保留或替换成你的真实 OpenWrt 编译步骤
      # 要求最后把固件文件放到 /builder/rom/
      # =====================================================================
      - name: Build OpenWrt
        env:
          DEVICE: ${{ inputs.device }}
          OPENWRT_VERSION: ${{ inputs.version }}
          LAN_ADDR: ${{ inputs.lan_addr }}
          ROOT_PASSWORD: ${{ inputs.root_password }}
          MIHOMO_CORE: ${{ inputs.mihomo_core }}
          BUILD_OPTIONS: ${{ inputs.build_options }}
        run: |
          set -euo pipefail

          echo "请将这里替换成你现有的编译命令。"
          echo "编译完成后，需要把固件文件复制到：${ROM_DIR}"

          # 示例：
          # bash scripts/build-openwrt.sh \
          #   --device "${DEVICE}" \
          #   --version "${OPENWRT_VERSION}" \
          #   --lan "${LAN_ADDR}" \
          #   --mihomo "${MIHOMO_CORE}" \
          #   --options "${BUILD_OPTIONS}"
          #
          # cp -av bin/targets/*/*/* "${ROM_DIR}/"

          if ! find "${ROM_DIR}" -maxdepth 1 -type f | grep -q .; then
            echo "::error::${ROM_DIR} 中没有固件文件。请把 Build OpenWrt 步骤替换成你的真实编译命令。"
            exit 1
          fi

      - name: Normalize firmware file names
        run: |
          set -euo pipefail

          shopt -s nullglob

          echo "Original firmware files:"
          find "${ROM_DIR}" -maxdepth 1 -type f -printf '%f\n' | sort || true

          # 删除无用临时文件
          find "${ROM_DIR}" -maxdepth 1 -type f \
            \( -name '*.manifest' -o -name '*.buildinfo' -o -name '*.json' \) \
            -print || true

          echo "Firmware files after normalization:"
          find "${ROM_DIR}" -maxdepth 1 -type f -printf '%f\n' | sort || true

      - name: Check firmware assets
        run: |
          set -euo pipefail

          echo "Firmware files:"
          find "${ROM_DIR}" -maxdepth 1 -type f -printf '%f\n' | sort

          count="$(find "${ROM_DIR}" -maxdepth 1 -type f | wc -l)"
          echo "File count: ${count}"

          if [ "${count}" -eq 0 ]; then
            echo "::error::No firmware files found in ${ROM_DIR}"
            exit 1
          fi

          echo
          echo "File size:"
          ls -lh "${ROM_DIR}"

          echo
          echo "Check empty files:"
          empty_files="$(find "${ROM_DIR}" -maxdepth 1 -type f -size 0 -printf '%f\n' || true)"
          if [ -n "${empty_files}" ]; then
            echo "::error::Empty firmware files found:"
            echo "${empty_files}"
            exit 1
          fi

          echo
          echo "Disk:"
          df -hT / /home /builder || true

      - name: Collect build metadata
        id: meta
        run: |
          set -euo pipefail

          build_time="$(date '+%Y-%m-%d %H:%M:%S')"
          build_time_utc="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          tag_time="$(date '+%Y.%m.%d-%H%M')"

          device_upper="$(echo "${DEVICE}" | tr '[:lower:]' '[:upper:]')"

          # Release tag 不建议包含空格
          release_tag="${OPENWRT_VERSION}-${DEVICE}-${tag_time}"

          # Release 标题可以更美观
          release_title="${tag_time} • ${device_upper} • ${OPENWRT_VERSION}"

          echo "BUILD_TIME=${build_time}" >> "${GITHUB_ENV}"
          echo "BUILD_TIME_UTC=${build_time_utc}" >> "${GITHUB_ENV}"
          echo "RELEASE_TAG=${release_tag}" >> "${GITHUB_ENV}"
          echo "RELEASE_TITLE=${release_title}" >> "${GITHUB_ENV}"

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_title=${release_title}" >> "${GITHUB_OUTPUT}"

          echo "Release tag: ${release_tag}"
          echo "Release title: ${release_title}"

      - name: Generate release info
        env:
          ROM_DIR: ${{ env.ROM_DIR }}
          INFO_DIR: ${{ env.INFO_DIR }}

          OPENWRT_VERSION: ${{ env.OPENWRT_VERSION }}
          BUILD_TIME: ${{ env.BUILD_TIME }}
          DEVICE: ${{ env.DEVICE }}
          TARGET: ${{ env.DEVICE }}

          # 如果你的编译系统能拿到真实内核版本，可以在前面写入 GITHUB_ENV 覆盖
          KERNEL_VERSION: ${{ env.KERNEL_VERSION || 'unknown' }}

          # 如果你有真实变量，也可以覆盖
          GCC_VERSION: ${{ env.GCC_VERSION || 'GCC15' }}
          WEB_SERVER: ${{ env.WEB_SERVER || 'nginx' }}
          DOCKER: ${{ env.DOCKER || 'true' }}
          MIHOMO_CORE: ${{ env.MIHOMO_CORE }}
          LAN_ADDR: ${{ env.LAN_ADDR }}
          ROOT_PASSWORD: ${{ env.ROOT_PASSWORD }}
          BUILD_OPTIONS: ${{ env.BUILD_OPTIONS }}
          RELEASE_TITLE: ${{ env.RELEASE_TITLE }}

          SOURCE_REPO: ${{ github.repository }}
          SOURCE_BRANCH: ${{ github.ref_name }}
          SOURCE_COMMIT: ${{ github.sha }}

          PLUGINS: "Docker=true Docker管理=true PassWall=true OpenClash=true Mihomo_Nikki=true MosDNS=true OpenAppFilter=true UPnP=true TTYD终端=true Argon主题=true"
        run: |
          set -euo pipefail

          chmod +x scripts/gen-release-info.sh
          scripts/gen-release-info.sh

          echo "Release info:"
          sed -n '1,200p' "${INFO_DIR}/info.md"

      - name: Append build summary
        run: |
          set -euo pipefail

          if [ -f "${INFO_DIR}/summary.md" ]; then
            cat "${INFO_DIR}/summary.md" >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "No summary file found." >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ inputs.device }}-${{ env.RELEASE_TAG }}-${{ github.run_attempt }}
          path: |
            /builder/rom/*
            /builder/info/info.md
            /builder/info/summary.md
          if-no-files-found: error
          compression-level: 0
          overwrite: true
          retention-days: 7

      - name: Delete existing release assets with same names
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          tag="${RELEASE_TAG}"

          echo "Checking release: ${tag}"

          if ! gh release view "${tag}" >/dev/null 2>&1; then
            echo "Release ${tag} does not exist yet, skip deleting assets."
            exit 0
          fi

          echo "Existing release found. Delete same-name assets before upload."

          shopt -s nullglob

          for file in "${ROM_DIR}"/*; do
            [ -f "${file}" ] || continue

            name="$(basename "${file}")"

            echo "Deleting existing asset if exists: ${name}"
            gh release delete-asset "${tag}" "${name}" -y || true
          done

          echo "Done deleting duplicated assets."

      - name: Create or update GitHub release
        uses: ncipollo/release-action@main
        with:
          tag: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TITLE }}
          commit: ${{ github.sha }}
          bodyFile: /builder/info/info.md

          artifacts: /builder/rom/*

          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: false
          artifactErrorsFailBuild: true

          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          echo "Verify release: ${RELEASE_TAG}"

          gh release view "${RELEASE_TAG}" --json name,tagName,isLatest,url,assets \
            --jq '
              "Release: " + .name,
              "Tag: " + .tagName,
              "Latest: " + (.isLatest|tostring),
              "URL: " + .url,
              "Assets:",
              (.assets[] | "- " + .name + " (" + (.size|tostring) + " bytes)")
            '

          expected_count="$(find "${ROM_DIR}" -maxdepth 1 -type f | wc -l)"
          actual_count="$(gh release view "${RELEASE_TAG}" --json assets --jq '.assets | length')"

          echo "Expected assets: ${expected_count}"
          echo "Actual assets: ${actual_count}"

          if [ "${actual_count}" -lt "${expected_count}" ]; then
            echo "::error::Release assets count is less than expected."
            exit 1
          fi

      - name: Cleanup old workflow artifacts
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          echo "Current workflow artifacts:"
          gh run view "${GITHUB_RUN_ID}" --json artifacts --jq '.artifacts[]? | [.name, .sizeInBytes, .expired] | @tsv' || true

          echo "Cleanup step finished."
