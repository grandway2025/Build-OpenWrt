name: Build releases

run-name: Build ${{ inputs.device }} • ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      device:
        description: "目标设备"
        required: true
        default: "x86_64"
        type: choice
        options:
          - x86_64
          - armv8
          - nanopi-r4s
          - nanopi-r5s
          - nanopi-r6s
          - nanopi-r76s

      version:
        description: "OpenWrt 版本"
        required: true
        default: "release"
        type: string

      ccache:
        description: 'Enable ccache (Use Cache to speed up next build)'
        type: boolean
        default: false
        
      lan_addr:
        description: "默认 LAN 地址"
        required: true
        default: "192.168.1.10"
        type: string

      root_password:
        description: "默认 root 密码，留空表示无密码"
        required: false
        default: ""
        type: string

      mihomo_core:
        description: "Mihomo 内核"
        required: true
        default: "meta"
        type: choice
        options:
          - meta
          - smart

      build_options:
        description: "构建选项"
        required: false
        default: "BUILD_FAST=y ENABLE_BPF=y ENABLE_LTO=y ENABLE_LRNG=y ENABLE_MOLD=y KERNEL_CLANG_LTO=y"
        type: string

permissions:
  contents: write
  actions: read

# 防止同一设备、同一版本并发构建和上传 Release
concurrency:
  group: build-release-${{ github.workflow }}-${{ inputs.device }}-${{ inputs.version }}
  cancel-in-progress: false

env:
  TZ: Asia/Shanghai

  # 提前启用 Node.js 24，减少 Node.js 20 deprecated 警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  WORK_DIR: /builder
  ROM_DIR: /builder/rom
  INFO_DIR: /builder/info

  DEVICE: ${{ inputs.device }}
  OPENWRT_VERSION: ${{ inputs.version }}
  LAN_ADDR: ${{ inputs.lan_addr }}
  ROOT_PASSWORD: ${{ inputs.root_password }}
  MIHOMO_CORE: ${{ inputs.mihomo_core }}
  BUILD_OPTIONS: ${{ inputs.build_options }}

jobs:
  build:
    name: Build ${{ inputs.device }}
    runs-on: ubuntu-24.04
    timeout-minutes: 720

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show build inputs
        run: |
          set -euo pipefail

          echo "============================================================"
          echo "Build inputs"
          echo "============================================================"
          echo "DEVICE=${DEVICE}"
          echo "OPENWRT_VERSION=${OPENWRT_VERSION}"
          echo "LAN_ADDR=${LAN_ADDR}"
          echo "MIHOMO_CORE=${MIHOMO_CORE}"
          echo "BUILD_OPTIONS=${BUILD_OPTIONS}"
          echo
          echo "GitHub repository: ${GITHUB_REPOSITORY}"
          echo "Git ref: ${GITHUB_REF}"
          echo "Git sha: ${GITHUB_SHA}"
          echo
          echo "Runner:"
          uname -a
          echo
          echo "Disk:"
          df -hT

      - name: Prepare workspace
        run: |
          set -euo pipefail

          sudo mkdir -p "${WORK_DIR}" "${ROM_DIR}" "${INFO_DIR}"
          sudo chown -R "${USER}:${USER}" "${WORK_DIR}"

          mkdir -p "${ROM_DIR}" "${INFO_DIR}"

          echo "WORK_DIR=${WORK_DIR}"
          echo "ROM_DIR=${ROM_DIR}"
          echo "INFO_DIR=${INFO_DIR}"

      - name: Free disk space
        run: |
          set -euo pipefail

          echo "Before cleanup:"
          df -hT

          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af || true

          echo "After cleanup:"
          df -hT

      # ============================================================
      # 关键步骤：
      # 这里必须调用你仓库中真实存在的 OpenWrt 编译脚本。
      #
      # 推荐你在仓库中准备以下任意一个脚本：
      #   scripts/build-openwrt.sh
      #   scripts/build-release.sh
      #   build-openwrt.sh
      #   build.sh
      #
      # 如果你的旧 workflow 里已有真实编译命令，也可以直接替换本步骤。
      # ============================================================
      - name: Build OpenWrt
        env:
          DEVICE: ${{ inputs.device }}
          OPENWRT_VERSION: ${{ inputs.version }}
          LAN_ADDR: ${{ inputs.lan_addr }}
          ROOT_PASSWORD: ${{ inputs.root_password }}
          MIHOMO_CORE: ${{ inputs.mihomo_core }}
          BUILD_OPTIONS: ${{ inputs.build_options }}
        run: |
          set -euo pipefail

          echo "============================================================"
          echo "Start OpenWrt build"
          echo "============================================================"

          echo "DEVICE=${DEVICE}"
          echo "OPENWRT_VERSION=${OPENWRT_VERSION}"
          echo "LAN_ADDR=${LAN_ADDR}"
          echo "MIHOMO_CORE=${MIHOMO_CORE}"
          echo "BUILD_OPTIONS=${BUILD_OPTIONS}"

          echo
          echo "Repository files:"
          find . -maxdepth 2 -type f | sort | sed 's#^\./##' | head -200

          echo
          echo "Detect build script..."

          if [ -x "openwrt/build.sh" ]; then
            echo "Use openwrt/build.sh"
            openwrt/build.sh

          elif [ -f "openwrt/build.sh" ]; then
            echo "Use bash openwrt/build.sh"
            bash openwrt/build.sh

          elif [ -x "scripts/build-release.sh" ]; then
            echo "Use scripts/build-release.sh"
            scripts/build-release.sh

          elif [ -f "scripts/build-release.sh" ]; then
            echo "Use bash scripts/build-release.sh"
            bash scripts/build-release.sh

          elif [ -x "build-openwrt.sh" ]; then
            echo "Use build-openwrt.sh"
            ./build-openwrt.sh

          elif [ -f "build-openwrt.sh" ]; then
            echo "Use bash build-openwrt.sh"
            bash build-openwrt.sh

          elif [ -x "build.sh" ]; then
            echo "Use build.sh"
            ./build.sh

          elif [ -f "build.sh" ]; then
            echo "Use bash build.sh"
            bash build.sh

          else
            echo "::error::No build script found."
            echo
            echo "Please provide one of these files:"
            echo "  scripts/build-openwrt.sh"
            echo "  scripts/build-release.sh"
            echo "  build-openwrt.sh"
            echo "  build.sh"
            echo
            echo "Or replace this Build OpenWrt step with your old working compile commands."
            exit 1
          fi

          echo
          echo "Build step finished."

      - name: Collect firmware files
        run: |
          set -euo pipefail

          echo "============================================================"
          echo "Collect firmware files"
          echo "============================================================"

          mkdir -p "${ROM_DIR}"

          echo "Search OpenWrt output directories..."

          candidate_dirs=()

          case "${DEVICE}" in
            x86_64)
              candidate_dirs+=(
                "openwrt/bin/targets/x86/64"
                "build/openwrt/bin/targets/x86/64"
                "bin/targets/x86/64"
              )
              ;;

            armv8)
              candidate_dirs+=(
                "openwrt/bin/targets/armsr/armv8"
                "build/openwrt/bin/targets/armsr/armv8"
                "bin/targets/armsr/armv8"
              )
              ;;

            nanopi-r4s|nanopi-r5s|nanopi-r6s|nanopi-r76s)
              candidate_dirs+=(
                "openwrt/bin/targets/rockchip/armv8"
                "build/openwrt/bin/targets/rockchip/armv8"
                "bin/targets/rockchip/armv8"
              )
              ;;

            *)
              echo "::warning::Unknown device ${DEVICE}, use generic search."
              ;;
          esac

          # 通用候选路径
          candidate_dirs+=(
            "openwrt/bin/targets"
            "build/openwrt/bin/targets"
            "bin/targets"
            "${WORK_DIR}/openwrt/bin/targets"
            "${WORK_DIR}/bin/targets"
          )

          echo "Candidate dirs:"
          printf '  - %s\n' "${candidate_dirs[@]}"

          copied=0

          for dir in "${candidate_dirs[@]}"; do
            if [ ! -d "${dir}" ]; then
              continue
            fi

            echo
            echo "Scan dir: ${dir}"

            find "${dir}" -type f \
              \( \
                -name '*.img' -o \
                -name '*.img.gz' -o \
                -name '*.bin' -o \
                -name '*.itb' -o \
                -name '*.ubi' -o \
                -name '*.iso' -o \
                -name '*.vmdk' -o \
                -name '*.vdi' -o \
                -name '*.qcow2' -o \
                -name '*.tar' -o \
                -name '*.tar.gz' \
              \) \
              ! -name '*kernel*' \
              ! -name '*rootfs*' \
              -print0 | while IFS= read -r -d '' file; do
                echo "Copy: ${file}"
                cp -av "${file}" "${ROM_DIR}/"
              done
          done

          echo
          echo "Collected firmware files:"
          find "${ROM_DIR}" -maxdepth 1 -type f -printf '%f\n' | sort || true

          count="$(find "${ROM_DIR}" -maxdepth 1 -type f | wc -l)"
          echo "Firmware count: ${count}"

          if [ "${count}" -eq 0 ]; then
            echo "::error::No firmware files collected into ${ROM_DIR}."
            echo
            echo "Please check:"
            echo "1. Whether the OpenWrt build completed successfully."
            echo "2. Whether firmware output exists under bin/targets/*/*/."
            echo "3. Whether your build script used a custom output path."
            echo
            echo "Available directories:"
            find . -maxdepth 5 -type d \( -name targets -o -name bin -o -name openwrt \) | sort || true
            exit 1
          fi

      - name: Normalize firmware file names
        run: |
          set -euo pipefail

          echo "============================================================"
          echo "Normalize firmware files"
          echo "============================================================"

          shopt -s nullglob

          echo "Before normalization:"
          find "${ROM_DIR}" -maxdepth 1 -type f -printf '%f\n' | sort || true

          # 删除无关元数据文件，避免作为 Release Asset 上传
          find "${ROM_DIR}" -maxdepth 1 -type f \
            \( \
              -name '*.manifest' -o \
              -name '*.buildinfo' -o \
              -name '*.json' -o \
              -name 'profiles.json' \
            \) \
            -print -delete || true

          echo
          echo "After normalization:"
          find "${ROM_DIR}" -maxdepth 1 -type f -printf '%f\n' | sort || true

      - name: Check firmware assets
        run: |
          set -euo pipefail

          echo "============================================================"
          echo "Check firmware assets"
          echo "============================================================"

          echo "Firmware files:"
          find "${ROM_DIR}" -maxdepth 1 -type f -printf '%f\n' | sort

          count="$(find "${ROM_DIR}" -maxdepth 1 -type f | wc -l)"
          echo "File count: ${count}"

          if [ "${count}" -eq 0 ]; then
            echo "::error::No firmware files found in ${ROM_DIR}"
            exit 1
          fi

          echo
          echo "File sizes:"
          ls -lh "${ROM_DIR}"

          echo
          echo "Check empty files:"
          empty_files="$(find "${ROM_DIR}" -maxdepth 1 -type f -size 0 -printf '%f\n' || true)"
          if [ -n "${empty_files}" ]; then
            echo "::error::Empty firmware files found:"
            echo "${empty_files}"
            exit 1
          fi

          echo
          echo "Disk:"
          df -hT / /home "${WORK_DIR}" || true

      - name: Collect build metadata
        id: meta
        run: |
          set -euo pipefail

          build_time="$(date '+%Y-%m-%d %H:%M:%S')"
          build_time_utc="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          tag_time="$(date '+%Y.%m.%d-%H%M')"

          device_upper="$(echo "${DEVICE}" | tr '[:lower:]' '[:upper:]')"

          # Release tag 不建议包含空格
          safe_version="$(echo "${OPENWRT_VERSION}" | tr ' /:@' '----')"
          release_tag="${safe_version}-${DEVICE}-${tag_time}"

          # Release 标题可以更美观
          release_title="${tag_time} • ${device_upper} • ${OPENWRT_VERSION}"

          echo "BUILD_TIME=${build_time}" >> "${GITHUB_ENV}"
          echo "BUILD_TIME_UTC=${build_time_utc}" >> "${GITHUB_ENV}"
          echo "RELEASE_TAG=${release_tag}" >> "${GITHUB_ENV}"
          echo "RELEASE_TITLE=${release_title}" >> "${GITHUB_ENV}"

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_title=${release_title}" >> "${GITHUB_OUTPUT}"

          echo "Release tag: ${release_tag}"
          echo "Release title: ${release_title}"

      - name: Detect toolchain metadata
        run: |
          set -euo pipefail

          echo "============================================================"
          echo "Detect toolchain metadata"
          echo "============================================================"

          kernel_version="unknown"
          gcc_version="GCC15"
          web_server="nginx"
          docker_enabled="true"

          # 尝试从常见 OpenWrt 输出中提取内核版本
          if find . -path '*/bin/targets/*/*/*.manifest' -type f | grep -q .; then
            manifest="$(find . -path '*/bin/targets/*/*/*.manifest' -type f | head -n 1)"
            echo "Manifest: ${manifest}"

            detected_kernel="$(grep -E '^kernel - ' "${manifest}" | awk '{print $3}' | head -n 1 || true)"
            if [ -n "${detected_kernel}" ]; then
              kernel_version="${detected_kernel}"
            fi
          fi

          # 尝试从 staging/toolchain 目录判断 GCC
          if find . -type d -path '*staging_dir/toolchain-*gcc-15*' | grep -q .; then
            gcc_version="GCC15"
          elif find . -type d -path '*staging_dir/toolchain-*gcc-14*' | grep -q .; then
            gcc_version="GCC14"
          elif find . -type d -path '*staging_dir/toolchain-*gcc-13*' | grep -q .; then
            gcc_version="GCC13"
          elif find . -type d -path '*staging_dir/toolchain-*gcc-12*' | grep -q .; then
            gcc_version="GCC12"
          fi

          echo "KERNEL_VERSION=${kernel_version}" >> "${GITHUB_ENV}"
          echo "GCC_VERSION=${gcc_version}" >> "${GITHUB_ENV}"
          echo "WEB_SERVER=${web_server}" >> "${GITHUB_ENV}"
          echo "DOCKER=${docker_enabled}" >> "${GITHUB_ENV}"

          echo "KERNEL_VERSION=${kernel_version}"
          echo "GCC_VERSION=${gcc_version}"
          echo "WEB_SERVER=${web_server}"
          echo "DOCKER=${docker_enabled}"

      - name: Generate release info
        env:
          ROM_DIR: ${{ env.ROM_DIR }}
          INFO_DIR: ${{ env.INFO_DIR }}

          OPENWRT_VERSION: ${{ env.OPENWRT_VERSION }}
          BUILD_TIME: ${{ env.BUILD_TIME }}
          DEVICE: ${{ env.DEVICE }}
          TARGET: ${{ env.DEVICE }}

          KERNEL_VERSION: ${{ env.KERNEL_VERSION }}
          GCC_VERSION: ${{ env.GCC_VERSION }}
          WEB_SERVER: ${{ env.WEB_SERVER }}
          DOCKER: ${{ env.DOCKER }}

          MIHOMO_CORE: ${{ env.MIHOMO_CORE }}
          LAN_ADDR: ${{ env.LAN_ADDR }}
          ROOT_PASSWORD: ${{ env.ROOT_PASSWORD }}
          BUILD_OPTIONS: ${{ env.BUILD_OPTIONS }}
          RELEASE_TITLE: ${{ env.RELEASE_TITLE }}

          SOURCE_REPO: ${{ github.repository }}
          SOURCE_BRANCH: ${{ github.ref_name }}
          SOURCE_COMMIT: ${{ github.sha }}

          PLUGINS: "Docker=true Docker管理=true PassWall=true OpenClash=true Mihomo_Nikki=true MosDNS=true OpenAppFilter=true UPnP=true TTYD终端=true Argon主题=true"
        run: |
          set -euo pipefail

          echo "============================================================"
          echo "Generate release info"
          echo "============================================================"

          if [ ! -f "scripts/gen-release-info.sh" ]; then
            echo "::error::scripts/gen-release-info.sh not found."
            exit 1
          fi

          chmod +x scripts/gen-release-info.sh
          scripts/gen-release-info.sh

          echo
          echo "Generated files:"
          find "${INFO_DIR}" "${ROM_DIR}" -maxdepth 1 -type f -printf '%p\n' | sort

          echo
          echo "Release info preview:"
          sed -n '1,220p' "${INFO_DIR}/info.md"

      - name: Append build summary
        if: always()
        run: |
          set -euo pipefail

          if [ -f "${INFO_DIR}/summary.md" ]; then
            cat "${INFO_DIR}/summary.md" >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "No summary file found." >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ inputs.device }}-${{ env.RELEASE_TAG }}-${{ github.run_attempt }}
          path: |
            /builder/rom/*
            /builder/info/info.md
            /builder/info/summary.md
          if-no-files-found: error
          compression-level: 0
          overwrite: true
          retention-days: 7

      - name: Delete existing release assets with same names
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          echo "============================================================"
          echo "Delete duplicated release assets"
          echo "============================================================"

          tag="${RELEASE_TAG}"

          echo "Release tag: ${tag}"

          if ! gh release view "${tag}" >/dev/null 2>&1; then
            echo "Release ${tag} does not exist yet, skip deleting assets."
            exit 0
          fi

          echo "Existing release found. Delete same-name assets before upload."

          shopt -s nullglob

          for file in "${ROM_DIR}"/*; do
            [ -f "${file}" ] || continue

            name="$(basename "${file}")"

            echo "Deleting existing asset if exists: ${name}"
            gh release delete-asset "${tag}" "${name}" -y || true
          done

          echo "Done."

      - name: Create or update GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TITLE }}
          commit: ${{ github.sha }}
          bodyFile: /builder/info/info.md

          artifacts: /builder/rom/*

          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: false
          artifactErrorsFailBuild: true

          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          echo "============================================================"
          echo "Verify release assets"
          echo "============================================================"

          echo "Verify release: ${RELEASE_TAG}"

          gh release view "${RELEASE_TAG}" --json name,tagName,isLatest,url,assets \
            --jq '
              "Release: " + .name,
              "Tag: " + .tagName,
              "Latest: " + (.isLatest|tostring),
              "URL: " + .url,
              "Assets:",
              (.assets[] | "- " + .name + " (" + (.size|tostring) + " bytes)")
            '

          expected_count="$(find "${ROM_DIR}" -maxdepth 1 -type f | wc -l)"
          actual_count="$(gh release view "${RELEASE_TAG}" --json assets --jq '.assets | length')"

          echo "Expected assets: ${expected_count}"
          echo "Actual assets: ${actual_count}"

          if [ "${actual_count}" -lt "${expected_count}" ]; then
            echo "::error::Release assets count is less than expected."
            exit 1
          fi

      - name: Cleanup old workflow artifacts
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          echo "============================================================"
          echo "Workflow artifacts"
          echo "============================================================"

          gh run view "${GITHUB_RUN_ID}" --json artifacts \
            --jq '.artifacts[]? | [.name, .sizeInBytes, .expired] | @tsv' || true

          echo "Cleanup step finished."
