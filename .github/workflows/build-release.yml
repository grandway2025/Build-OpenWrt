name: Build releases

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Select the build device'
        required: true
        default: 'x86_64'
        type: choice
        options:
          - armv8
          - nanopi-r4s
          - nanopi-r5s
          - nanopi-r76s
          - x86_64

      version:
        description: 'Select the build version'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - snapshot-25.12

      info_mode:
        description: 'Release 信息展示模式'
        required: true
        default: 'curated'
        type: choice
        options:
          - curated
          - all
          - both
          - minimal

      ccache:
        description: 'Enable ccache'
        type: boolean
        default: false

      lan_addr:
        description: 'Default LAN address'
        required: true
        default: '192.168.1.10'
        type: string

      mihomo_core:
        description: 'Mihomo core type'
        required: true
        default: 'meta'
        type: choice
        options:
          - meta
          - smart

      root_password:
        description: 'Default root password, empty means no password'
        required: false
        default: ''
        type: string

      build_options:
        description: 'Build options, separated by spaces'
        required: false
        default: 'BUILD_FAST=y ENABLE_BPF=y ENABLE_LTO=y ENABLE_LRNG=y ENABLE_MOLD=y KERNEL_CLANG_LTO=y'
        type: string

jobs:
  build:
    name: Build ${{ inputs.device }}
    runs-on: ubuntu-24.04

    defaults:
      run:
        shell: bash

    env:
      BUILD_DIR: /builder
      SCRIPT_DIR: ${{ github.workspace }}/r4s_build_script
      RELEASE_INFO_SCRIPT: ${{ github.workspace }}/r4s_build_script/scripts/gen-release-info.sh
      CACHE_KEY: openwrt-25.12-${{ inputs.device }}-ccache
      IS_RELEASE_CCACHE_DEVICE: ${{ inputs.device == 'armv8' || inputs.device == 'nanopi-r4s' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: r4s_build_script

      - name: Setup variables
        run: |
          sudo timedatectl set-timezone 'Asia/Shanghai'

          git config --global user.name 'actions'
          git config --global user.email 'action@github.com'

          echo "build_dir=${BUILD_DIR}" >> "$GITHUB_ENV"

          if [ "${{ inputs.version }}" = "release" ]; then
            echo "build_version=rc2" >> "$GITHUB_ENV"
          else
            echo "build_version=dev" >> "$GITHUB_ENV"
          fi

      - name: Show system
        run: |
          echo "CPU:"
          lscpu | sed -n '1,20p' || true

          echo
          echo "Memory:"
          free -h

          echo
          echo "Storage:"
          df -hT / /mnt || true

          echo
          echo "System:"
          lsb_release -a || true
          uname -a

      - name: Install Caddy Server
        run: |
          sudo curl -fsSL -o /usr/bin/caddy https://github.com/sbwml/r4s_build_script/releases/download/caddy/caddy
          sudo chmod 755 /usr/bin/caddy

          cat > caddyfile <<EOF
          :8080 {
              root * ${SCRIPT_DIR}
              file_server browse
          }
          EOF

          sudo /usr/bin/caddy start --config caddyfile --adapter caddyfile

      - name: Free disk space
        uses: sbwml/actions@free-disk
        with:
          build-mount-path: ${{ env.BUILD_DIR }}

      - name: Build System Setup
        uses: sbwml/actions@openwrt-build-setup

      - name: Install LLVM
        uses: sbwml/actions@install-llvm

      # 普通设备使用 GitHub Actions cache
      - name: Restore ccache
        if: ${{ inputs.ccache && !(inputs.device == 'armv8' || inputs.device == 'nanopi-r4s') }}
        uses: actions/cache/restore@v4
        with:
          path: /builder/.ccache
          key: ${{ env.CACHE_KEY }}

      # armv8 / nanopi-r4s 使用 release 资产保存 ccache
      - name: Restore ccache from release
        if: ${{ inputs.ccache && (inputs.device == 'armv8' || inputs.device == 'nanopi-r4s') }}
        continue-on-error: true
        working-directory: /builder
        run: |
          curl -fsSL https://api.github.com/repos/${{ github.repository }}/releases \
            | grep 'browser_download_url' \
            | grep ccache \
            | grep '${{ inputs.device }}' \
            | awk -F '"' '{print $4}' \
            | grep -v '^$' \
            | xargs -r -n 1 wget -q

          if ls ${{ inputs.device }}.tar.* >/dev/null 2>&1; then
            cat ${{ inputs.device }}.tar.* | tar -xf - || true
            rm -f ${{ inputs.device }}.tar.* || true
          fi

          if [ -d .ccache ]; then
            cache_size=$(du -sb .ccache | awk '{print $1}')
          else
            cache_size=0
          fi

          cache_size_mb=$(( cache_size / 1024 / 1024 ))
          echo "Cache Size: ~${cache_size_mb} MB (${cache_size} B)"

      - name: Compile OpenWrt
        id: compile
        continue-on-error: true
        working-directory: /builder
        env:
          git_name: grandway2025
          git_password: ${{ secrets.CLONE_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export ${{ inputs.build_options }}
          export LAN="${{ inputs.lan_addr }}"
          export USE_GCC15=y
          export mihomo_core="${{ inputs.mihomo_core }}"

          if [ "${{ inputs.ccache }}" = "true" ]; then
            export ENABLE_CCACHE=y
          fi

          if [ -n "${{ inputs.root_password }}" ]; then
            export ROOT_PASSWORD="${{ inputs.root_password }}"
          fi

          bash <(curl -fsSL http://127.0.0.1:8080/build.sh) "${{ env.build_version }}" "${{ inputs.device }}"

          cd openwrt

          if [ "${{ inputs.version }}" = "release" ]; then
            tags="OpenWrt-$(git describe --abbrev=0 --tags)"
          else
            tags="snapshot-25.12-$(git log -n 1 --date=format:'%Y%m%d' --format='%cd')-$(git log --pretty=format:'%h' -1)"
          fi

          echo "latest_release=${tags}" >> "$GITHUB_ENV"

      - name: Extensive logs after a failed compilation
        if: steps.compile.outcome == 'failure'
        working-directory: /builder/openwrt
        run: |
          make V=s

      - name: Stop if compile failed
        if: steps.compile.outcome == 'failure'
        run: exit 1

      - name: Delete old ccache
        if: ${{ inputs.ccache && !(inputs.device == 'armv8' || inputs.device == 'nanopi-r4s') }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh cache delete "${CACHE_KEY}" || true

      - name: Save ccache
        if: ${{ inputs.ccache && !(inputs.device == 'armv8' || inputs.device == 'nanopi-r4s') }}
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: /builder/.ccache
          key: ${{ env.CACHE_KEY }}

      - name: Create ccache tar files
        if: ${{ inputs.ccache && (inputs.device == 'armv8' || inputs.device == 'nanopi-r4s') }}
        continue-on-error: true
        working-directory: /builder
        run: |
          mkdir -p ccache

          if [ -d .ccache ]; then
            tar cf - .ccache | split -d -b 1800m - "ccache/${{ inputs.device }}.tar."
            ls -lh ccache
          else
            echo "No .ccache directory found, skip ccache tar."
          fi

      - name: Generate ccache release info
        if: ${{ inputs.ccache && (inputs.device == 'armv8' || inputs.device == 'nanopi-r4s') }}
        working-directory: /builder
        run: |
          if [ ! -f "$RELEASE_INFO_SCRIPT" ]; then
            echo "Release info script not found: $RELEASE_INFO_SCRIPT"
            find "$GITHUB_WORKSPACE" -name "gen-release-info.sh" -type f || true
            exit 1
          fi

          bash "$RELEASE_INFO_SCRIPT"
        env:
          RELEASE_TAG: ccache-${{ inputs.device }}
          DEVICE: ${{ inputs.device }}
          INFO_MODE: minimal
          OUTPUT_FILE: /builder/info/ccache-info.md

      - name: Upload ccache release
        if: ${{ inputs.ccache && (inputs.device == 'armv8' || inputs.device == 'nanopi-r4s') }}
        continue-on-error: true
        uses: ncipollo/release-action@main
        with:
          name: ccache
          tag: ccache
          commit: ${{ github.ref_name }}
          bodyFile: /builder/info/ccache-info.md
          allowUpdates: true
          replacesArtifacts: true
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: /builder/ccache/*

      - name: Prepare Firmware Files
        working-directory: /builder
        run: |
          mkdir -p rom info

          case "${{ inputs.device }}" in
            x86_64)
              cp -a openwrt/bin/targets/x86/*/*-ext4-combined-efi.img.gz rom/ || true
              cp -a openwrt/bin/targets/x86/*/*-squashfs-combined-efi.img.gz rom/ || true
              cp -a openwrt/bin/targets/x86/*/*-generic-rootfs.tar.gz rom/ || true
              cp -a openwrt/x86_64-*.tar.gz rom/ || true

              cp -a openwrt/bin/targets/x86/*/*.manifest info/manifest.txt
              cp -a openwrt/bin/targets/x86/*/config.buildinfo info/config.buildinfo
              ;;

            armv8)
              tar zcf rom/u-boot-qemu_armv8.tar.gz -C openwrt/bin/targets/armsr/armv8*/ ./u-boot-qemu_armv8 || true
              cp -a openwrt/bin/targets/armsr/armv8*/*-generic-initramfs-kernel.bin rom/ || true
              cp -a openwrt/bin/targets/armsr/armv8*/*-generic-kernel.bin rom/ || true
              cp -a openwrt/bin/targets/armsr/armv8*/*-generic-ext4-combined-efi.img.gz rom/ || true
              cp -a openwrt/bin/targets/armsr/armv8*/*-generic-squashfs-combined-efi.img.gz rom/ || true
              cp -a openwrt/bin/targets/armsr/armv8*/*-rootfs.tar.gz rom/ || true
              cp -a openwrt/armv8-*.tar.gz rom/ || true

              cp -a openwrt/bin/targets/armsr/armv8*/*.manifest info/manifest.txt
              cp -a openwrt/bin/targets/armsr/armv8*/config.buildinfo info/config.buildinfo
              ;;

            nanopi-*)
              cp -a openwrt/bin/targets/rockchip/*/*.img.gz rom/ || true
              cp -a openwrt/aarch64-*.tar.gz rom/ || true

              cp -a openwrt/bin/targets/rockchip/*/*.manifest info/manifest.txt
              cp -a openwrt/bin/targets/rockchip/*/config.buildinfo info/config.buildinfo
              ;;
          esac

          if [ ! -s info/manifest.txt ]; then
            echo "manifest.txt not found or empty"
            find openwrt/bin/targets -name "*.manifest" -type f || true
            exit 1
          fi

          if [ ! "$(find rom -type f | wc -l)" -gt 0 ]; then
            echo "No firmware files found in /builder/rom"
            find openwrt/bin/targets -type f | sed -n '1,120p'
            exit 1
          fi

          cd rom
          sha256sum * > ../info/sha256sums.txt

          echo "Prepared files:"
          ls -lh /builder/rom
          echo
          echo "Manifest:"
          ls -lh /builder/info/manifest.txt
          echo
          echo "SHA256:"
          cat /builder/info/sha256sums.txt

      - name: Generate release info
        working-directory: /builder
        run: |
          if [ ! -f "$RELEASE_INFO_SCRIPT" ]; then
            echo "Release info script not found: $RELEASE_INFO_SCRIPT"
            find "$GITHUB_WORKSPACE" -name "gen-release-info.sh" -type f || true
            exit 1
          fi

          if [ ! -f /builder/info/manifest.txt ]; then
            echo "/builder/info/manifest.txt not found"
            exit 1
          fi

          bash "$RELEASE_INFO_SCRIPT"
        env:
          RELEASE_TAG: ${{ env.latest_release }}
          DEVICE: ${{ inputs.device }}
          LAN_ADDR: ${{ inputs.lan_addr }}
          ROOT_PASSWORD: ${{ inputs.root_password }}
          KERNEL_VERSION: N/A
          GCC_VERSION: GCC15
          WEB_SERVER: nginx
          MIHOMO_CORE: ${{ inputs.mihomo_core }}
          DOCKER: auto
          BUILD_OPTIONS: ${{ inputs.build_options }}
          MANIFEST_FILE: /builder/info/manifest.txt
          OUTPUT_FILE: /builder/info/info.md
          INFO_MODE: ${{ inputs.info_mode }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.device }}-openwrt-${{ env.latest_release }}
          path: /builder/rom/*

      - name: Create release
        uses: ncipollo/release-action@main
        with:
          name: ${{ env.latest_release }}
          tag: ${{ env.latest_release }}
          commit: ${{ github.ref_name }}
          bodyFile: /builder/info/info.md
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: /builder/rom/*
