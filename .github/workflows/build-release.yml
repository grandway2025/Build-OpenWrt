name: Build releases

run-name: Build ${{ inputs.device }} • ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      device:
        description: "目标设备"
        required: true
        default: "x86_64"
        type: choice
        options:
          - x86_64
          - armv8
          - nanopi-r4s
          - nanopi-r5s
          - nanopi-r6s
          - nanopi-r76s

      version:
        description: "版本类型"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - snapshot

      lan_addr:
        description: "默认 LAN 地址"
        required: true
        default: "192.168.1.10"
        type: string

      root_password:
        description: "默认 root 密码，留空表示无密码"
        required: false
        default: ""
        type: string

      mihomo_core:
        description: "Mihomo 内核"
        required: true
        default: "meta"
        type: choice
        options:
          - meta
          - smart

      ccache:
        description: "是否启用 ccache"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      build_options:
        description: "构建选项"
        required: false
        default: "BUILD_FAST=y ENABLE_BPF=y ENABLE_LTO=y ENABLE_LRNG=y ENABLE_MOLD=y KERNEL_CLANG_LTO=y"
        type: string

permissions:
  contents: write
  actions: read

concurrency:
  group: build-release-${{ github.workflow }}-${{ inputs.device }}-${{ inputs.version }}
  cancel-in-progress: false

env:
  TZ: Asia/Shanghai

  WORK_DIR: /builder
  ROM_DIR: /builder/rom
  INFO_DIR: /builder/info

  DEVICE: ${{ inputs.device }}
  build_version: ${{ inputs.version }}
  RELEASE_VERSION: ${{ inputs.version }}
  LAN_ADDR: ${{ inputs.lan_addr }}
  ROOT_PASSWORD_INPUT: ${{ inputs.root_password }}
  MIHOMO_CORE: ${{ inputs.mihomo_core }}
  CCACHE_ENABLE: ${{ inputs.ccache }}
  BUILD_OPTIONS: ${{ inputs.build_options }}

jobs:
  build:
    name: Build ${{ inputs.device }}
    runs-on: ubuntu-24.04
    timeout-minutes: 720

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show build inputs
        run: |
          set -e

          echo "============================================================"
          echo "Build inputs"
          echo "============================================================"
          echo "DEVICE=${DEVICE}"
          echo "build_version=${build_version}"
          echo "RELEASE_VERSION=${RELEASE_VERSION}"
          echo "LAN_ADDR=${LAN_ADDR}"
          echo "MIHOMO_CORE=${MIHOMO_CORE}"
          echo "CCACHE_ENABLE=${CCACHE_ENABLE}"
          echo "BUILD_OPTIONS=${BUILD_OPTIONS}"
          echo "GITHUB_REPOSITORY=${GITHUB_REPOSITORY}"
          echo "GITHUB_REF=${GITHUB_REF}"
          echo "GITHUB_REF_NAME=${GITHUB_REF_NAME}"
          echo "GITHUB_SHA=${GITHUB_SHA}"

          echo
          echo "Runner:"
          uname -a

          echo
          echo "Disk:"
          df -hT

      - name: Prepare workspace
        run: |
          set -e

          sudo mkdir -p "${WORK_DIR}" "${ROM_DIR}" "${INFO_DIR}"
          sudo chown -R "${USER}:${USER}" "${WORK_DIR}"

          echo "WORK_DIR=${WORK_DIR}"
          echo "ROM_DIR=${ROM_DIR}"
          echo "INFO_DIR=${INFO_DIR}"

      - name: Free disk space
        run: |
          set -e

          echo "Before cleanup:"
          df -hT

          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af || true

          echo "After cleanup:"
          df -hT

      # 如果你的旧 workflow 里在此之前还有启动 127.0.0.1:8080 服务的步骤，
      # 请保留在这个位置之前。
      #
      # 因为下面的编译命令依赖：
      #   http://127.0.0.1:8080/build.sh

      - name: Check local build script endpoint
        run: |
          set -e

          echo "============================================================"
          echo "Check build.sh endpoint"
          echo "============================================================"

          if curl -fsSI http://127.0.0.1:8080/build.sh >/dev/null 2>&1; then
            echo "build.sh endpoint is available."
          else
            echo "::warning::http://127.0.0.1:8080/build.sh is not available now."
            echo "::warning::If your original workflow starts a local server before compile, please keep that step before Compile OpenWrt."
          fi

      - name: Compile OpenWrt
        working-directory: /builder
        id: compile
        continue-on-error: true
        env:
          git_name: grandway2025
          git_password: ${{ secrets.CLONE_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          echo "============================================================"
          echo "Compile OpenWrt"
          echo "============================================================"

          echo "DEVICE=${DEVICE}"
          echo "build_version=${build_version}"
          echo "LAN=${LAN_ADDR}"
          echo "mihomo_core=${MIHOMO_CORE}"
          echo "CCACHE_ENABLE=${CCACHE_ENABLE}"
          echo "BUILD_OPTIONS=${BUILD_OPTIONS}"

          # 保留你原来的动态构建参数导出方式
          export ${BUILD_OPTIONS} LAN="${LAN_ADDR}" USE_GCC15=y
          export mihomo_core="${MIHOMO_CORE}"

          if [ "${CCACHE_ENABLE}" = "true" ]; then
            export ENABLE_CCACHE=y
          fi

          if [ -n "${ROOT_PASSWORD_INPUT}" ]; then
            export ROOT_PASSWORD="${ROOT_PASSWORD_INPUT}"
          fi

          echo
          echo "Start remote build script:"
          echo "bash <(curl -sS http://127.0.0.1:8080/build.sh) ${build_version} ${DEVICE}"

          bash <(curl -sS http://127.0.0.1:8080/build.sh) "${build_version}" "${DEVICE}"

          cd openwrt

          if [ "${RELEASE_VERSION}" = "release" ]; then
            tags="OpenWrt-$(git describe --abbrev=0 --tags)"
          else
            tags="snapshot-25.12-$(git log -n 1 --date=format:"%Y%m%d" --format="%cd")-$(git log --pretty=format:"%h" -1)"
          fi

          echo "latest_release=${tags}" >> "${GITHUB_ENV}"
          echo "latest_release=${tags}"

      - name: Stop if compile failed
        if: steps.compile.outcome != 'success'
        run: |
          echo "::error::Compile OpenWrt failed."
          echo "Please check the Compile OpenWrt log above."
          exit 1

      - name: Collect firmware files
        run: |
          set -e

          echo "============================================================"
          echo "Collect firmware files"
          echo "============================================================"

          mkdir -p "${ROM_DIR}"

          echo "latest_release=${latest_release:-unknown}"

          case "${DEVICE}" in
            x86_64)
              TARGET_DIRS="
              /builder/openwrt/bin/targets/x86/64
              /builder/bin/targets/x86/64
              openwrt/bin/targets/x86/64
              bin/targets/x86/64
              "
              ;;

            armv8)
              TARGET_DIRS="
              /builder/openwrt/bin/targets/armsr/armv8
              /builder/bin/targets/armsr/armv8
              openwrt/bin/targets/armsr/armv8
              bin/targets/armsr/armv8
              "
              ;;

            nanopi-r4s|nanopi-r5s|nanopi-r6s|nanopi-r76s)
              TARGET_DIRS="
              /builder/openwrt/bin/targets/rockchip/armv8
              /builder/bin/targets/rockchip/armv8
              openwrt/bin/targets/rockchip/armv8
              bin/targets/rockchip/armv8
              "
              ;;

            *)
              TARGET_DIRS="
              /builder/openwrt/bin/targets
              /builder/bin/targets
              openwrt/bin/targets
              bin/targets
              "
              ;;
          esac

          TARGET_DIRS="${TARGET_DIRS}
          /builder/openwrt/bin/targets
          /builder/bin/targets
          "

          echo "Candidate target dirs:"
          echo "${TARGET_DIRS}"

          for dir in ${TARGET_DIRS}; do
            if [ ! -d "${dir}" ]; then
              continue
            fi

            echo
            echo "Scan: ${dir}"

            find "${dir}" -type f \
              \( \
                -name "*.img" -o \
                -name "*.img.gz" -o \
                -name "*.bin" -o \
                -name "*.itb" -o \
                -name "*.ubi" -o \
                -name "*.iso" -o \
                -name "*.vmdk" -o \
                -name "*.vdi" -o \
                -name "*.qcow2" -o \
                -name "*.tar" -o \
                -name "*.tar.gz" \
              \) \
              -print | while read -r file; do
                echo "Copy: ${file}"
                cp -av "${file}" "${ROM_DIR}/"
              done
          done

          echo
          echo "Collected files:"
          find "${ROM_DIR}" -maxdepth 1 -type f -printf "%f\n" | sort || true

          count="$(find "${ROM_DIR}" -maxdepth 1 -type f | wc -l)"
          echo "Firmware count: ${count}"

          if [ "${count}" -eq 0 ]; then
            echo "::error::No firmware files collected into ${ROM_DIR}."
            echo
            echo "Debug directories:"
            find /builder -maxdepth 5 -type d | sort | head -300 || true
            exit 1
          fi

      - name: Clean unwanted files
        run: |
          set -e

          echo "============================================================"
          echo "Clean unwanted files"
          echo "============================================================"

          find "${ROM_DIR}" -maxdepth 1 -type f \
            \( \
              -name "*.manifest" -o \
              -name "*.buildinfo" -o \
              -name "*.json" -o \
              -name "profiles.json" \
            \) \
            -print -delete || true

          echo "Remaining firmware files:"
          find "${ROM_DIR}" -maxdepth 1 -type f -printf "%f\n" | sort

          count="$(find "${ROM_DIR}" -maxdepth 1 -type f | wc -l)"
          if [ "${count}" -eq 0 ]; then
            echo "::error::No uploadable firmware files after cleanup."
            exit 1
          fi

      - name: Generate release metadata
        run: |
          set -e

          echo "============================================================"
          echo "Generate release metadata"
          echo "============================================================"

          mkdir -p "${INFO_DIR}"

          BUILD_TIME="$(date '+%Y-%m-%d %H:%M:%S')"
          TAG_TIME="$(date '+%Y.%m.%d-%H%M')"

          if [ -n "${latest_release:-}" ]; then
            BASE_TAG="${latest_release}"
          else
            BASE_TAG="${RELEASE_VERSION}"
          fi

          SAFE_BASE_TAG="$(echo "${BASE_TAG}" | tr ' /:@' '----')"

          RELEASE_TAG="${SAFE_BASE_TAG}-${DEVICE}-${TAG_TIME}"
          RELEASE_NAME="${DEVICE} - ${BASE_TAG} - ${TAG_TIME}"

          echo "BUILD_TIME=${BUILD_TIME}" >> "${GITHUB_ENV}"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "${GITHUB_ENV}"
          echo "RELEASE_NAME=${RELEASE_NAME}" >> "${GITHUB_ENV}"

          {
            echo "# OpenWrt Firmware"
            echo
            echo "## Build Information"
            echo
            echo "| Item | Value |"
            echo "| ---- | ----- |"
            echo "| Device | ${DEVICE} |"
            echo "| Build Version | ${RELEASE_VERSION} |"
            echo "| Latest Release | ${latest_release:-unknown} |"
            echo "| Build Time | ${BUILD_TIME} |"
            echo "| LAN IP | ${LAN_ADDR} |"
            echo "| Mihomo Core | ${MIHOMO_CORE} |"
            echo "| ccache | ${CCACHE_ENABLE} |"
            echo "| Repository | ${GITHUB_REPOSITORY} |"
            echo "| Branch | ${GITHUB_REF_NAME} |"
            echo "| Commit | ${GITHUB_SHA} |"
            echo
            echo "## Firmware Files"
            echo
            find "${ROM_DIR}" -maxdepth 1 -type f -printf "- %f\n" | sort
            echo
            echo "## SHA256"
            echo
            echo '```text'
            cd "${ROM_DIR}"
            sha256sum * | sort
            echo '```'
          } > "${INFO_DIR}/release.md"

          {
            echo "## OpenWrt Build Summary"
            echo
            echo "- Device: ${DEVICE}"
            echo "- Build Version: ${RELEASE_VERSION}"
            echo "- Latest Release: ${latest_release:-unknown}"
            echo "- Build Time: ${BUILD_TIME}"
            echo "- Release Tag: ${RELEASE_TAG}"
            echo
            echo "### Firmware Files"
            echo
            find "${ROM_DIR}" -maxdepth 1 -type f -printf "- %f\n" | sort
          } > "${INFO_DIR}/summary.md"

          echo "RELEASE_TAG=${RELEASE_TAG}"
          echo "RELEASE_NAME=${RELEASE_NAME}"

          echo
          echo "Release notes preview:"
          cat "${INFO_DIR}/release.md"

      - name: Append summary
        if: always()
        run: |
          if [ -f "${INFO_DIR}/summary.md" ]; then
            cat "${INFO_DIR}/summary.md" >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ inputs.device }}-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            /builder/rom/*
            /builder/info/release.md
            /builder/info/summary.md
          if-no-files-found: error
          compression-level: 0
          retention-days: 7
          overwrite: true

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          echo "============================================================"
          echo "Create or update GitHub Release"
          echo "============================================================"

          echo "RELEASE_TAG=${RELEASE_TAG}"
          echo "RELEASE_NAME=${RELEASE_NAME}"

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release exists, update it."

            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_NAME}" \
              --notes-file "${INFO_DIR}/release.md"
          else
            echo "Create new release."

            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_NAME}" \
              --notes-file "${INFO_DIR}/release.md" \
              --target "${GITHUB_SHA}"
          fi

          echo
          echo "Upload firmware assets..."

          for file in "${ROM_DIR}"/*; do
            [ -f "${file}" ] || continue

            name="$(basename "${file}")"

            echo "Delete old asset if exists: ${name}"
            gh release delete-asset "${RELEASE_TAG}" "${name}" -y || true

            echo "Upload asset: ${file}"
            gh release upload "${RELEASE_TAG}" "${file}" --clobber
          done

      - name: Verify release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          echo "============================================================"
          echo "Verify release"
          echo "============================================================"

          gh release view "${RELEASE_TAG}"

          echo
          echo "Release assets:"
          gh release view "${RELEASE_TAG}" --json assets \
            --jq '.assets[] | "- " + .name + " (" + (.size|tostring) + " bytes)"'

          expected_count="$(find "${ROM_DIR}" -maxdepth 1 -type f | wc -l)"
          actual_count="$(gh release view "${RELEASE_TAG}" --json assets --jq '.assets | length')"

          echo
          echo "Expected assets: ${expected_count}"
          echo "Actual assets: ${actual_count}"

          if [ "${actual_count}" -lt "${expected_count}" ]; then
            echo "::error::Release uploaded assets count is less than local firmware count."
            exit 1
          fi
